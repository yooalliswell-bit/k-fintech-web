<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech Admin Dashboard (Advanced CRM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .nowrap { white-space: nowrap; } 
        .truncate-text { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: help; }
        .fade-in-section { animation: fadeIn 0.4s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"] { font-size: 0.8rem; padding: 0.4rem; border-radius: 0.5rem; border: 1px solid #cbd5e1; }
    </style>
</head>
<body class="bg-gray-100 font-sans relative">

    <div id="login-screen" class="flex items-center justify-center h-screen bg-slate-900 absolute inset-0 z-50">
        <div class="bg-slate-800 p-10 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md text-white text-center">
            <i class="fas fa-user-shield text-6xl text-blue-500 mb-6"></i>
            <h2 class="text-3xl font-extrabold mb-2">Admin Login</h2>
            <form id="loginForm" class="space-y-5 text-left mt-8">
                <div><label class="block text-sm font-semibold text-slate-300 mb-1.5">Email</label><input type="email" id="adminEmail" required class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3.5 text-white"></div>
                <div><label class="block text-sm font-semibold text-slate-300 mb-1.5">Password</label><input type="password" id="adminPassword" required class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3.5 text-white"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition">로그인</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-screen overflow-hidden flex-row">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col border-r border-slate-800">
            <div class="p-6 text-2xl font-black border-b border-slate-800"><span class="text-blue-500 mr-1.5">K</span> Admin</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="block p-3.5 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white"><i class="fas fa-home mr-2.5"></i>웹사이트 가기</a>
                <div class="border-t border-slate-800 my-4"></div>
                <button onclick="switchView('investor')" class="w-full text-left block p-3.5 rounded-xl bg-blue-600/10 text-blue-400 font-semibold"><i class="fas fa-users-cog mr-2.5"></i>투자자 CRM</button>
                <button onclick="switchView('company')" class="w-full text-left block p-3.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white"><i class="fas fa-building mr-2.5"></i>기업 DB 관리</button>
            </nav>
            <div class="p-4 border-t border-slate-800"><button onclick="logoutAdmin()" class="w-full flex items-center justify-center p-3 rounded-xl text-red-400 hover:bg-red-950/30"><i class="fas fa-sign-out-alt mr-2.5"></i>로그아웃</button></div>
        </aside>
        
        <main class="flex-1 overflow-y-auto p-8 bg-slate-50">
            <header class="flex justify-between items-center mb-8 pb-6 border-b border-gray-200">
                <h1 class="text-3xl font-extrabold text-slate-950">투자자 CRM 관리</h1>
                <div id="total-investors" class="text-lg font-extrabold text-blue-600 bg-blue-50 px-4 py-2 rounded-full border border-blue-100"></div>
            </header>

            <div id="view-investor" class="fade-in-section">
                
                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                        <div><label class="block text-xs font-bold text-slate-500 mb-2 uppercase">구분 (Type)</label>
                            <select id="filterContactType" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm">
                                <option value="">전체 구분</option><option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option><option value="Media">Media</option><option value="Others">Others</option>
                            </select>
                        </div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-2 uppercase">국가</label><select id="filterCountry" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm"><option value="">전체 국가</option></select></div>
                        
                        <div class="lg:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">데이터 입력일 기간</label>
                            <div class="flex items-center gap-2">
                                <input type="date" id="filterInStart" class="w-full text-xs">
                                <span class="text-slate-400">~</span>
                                <input type="date" id="filterInEnd" class="w-full text-xs">
                            </div>
                        </div>

                        <div class="lg:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase text-blue-600">최근 접촉일 기간</label>
                            <div class="flex items-center gap-2">
                                <input type="date" id="filterContactStart" class="w-full text-xs border-blue-200 bg-blue-50/30">
                                <span class="text-slate-400">~</span>
                                <input type="date" id="filterContactEnd" class="w-full text-xs border-blue-200 bg-blue-50/30">
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center pt-4 border-t border-slate-100">
                        <div class="flex gap-2">
                            <button onclick="applyFilters()" class="bg-blue-600 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">조회하기</button>
                            <button onclick="resetFilters()" class="bg-slate-100 text-slate-600 px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-200 transition">초기화</button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="downloadCrmTemplate()" class="text-slate-500 text-xs font-bold hover:underline mr-2">예제 양식</button>
                            <button onclick="downloadExcel()" class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-100"><i class="fas fa-file-excel mr-1"></i> 엑셀 다운로드</button>
                        </div>
                    </div>
                </section>

                <section class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 font-bold border-b border-slate-100 text-xs">
                                <th class="p-4 w-10 text-center">No</th>
                                <th class="p-4">성함 (구분)</th>
                                <th class="p-4">소속기관</th>
                                <th class="p-4">국가</th>
                                <th class="p-4">이메일/연락처</th>
                                <th class="p-4 text-center">입력일</th>
                                <th class="p-4 text-center text-blue-600 font-black">최근 접촉일</th>
                                <th class="p-4 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="investor-list" class="divide-y divide-slate-50 text-slate-700">
                            </tbody>
                    </table>
                </section>
            </div>

            <div id="view-company" class="hidden">...</div>
        </main>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-bold">투자자 정보 업데이트</h3><button onclick="closeEditModal()"><i class="fas fa-times"></i></button></div>
            <form id="editForm" class="p-6 space-y-4" onsubmit="submitEditForm(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-400 mb-1">구분</label>
                        <select id="editContactType" class="w-full border rounded-lg p-2 text-sm bg-blue-50 border-blue-200">
                            <option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option><option value="Media">Media</option><option value="Others">Others</option>
                        </select>
                    </div>
                    <div><label class="block text-xs font-bold text-slate-400 mb-1">성함</label><input type="text" id="editName" class="w-full border rounded-lg p-2 text-sm"></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-400 mb-1">소속 기관</label><input type="text" id="editOrg" class="w-full border rounded-lg p-2 text-sm"></div>
                <div><label class="block text-xs font-bold text-blue-600 mb-1">최근 접촉일 (Contact Date)</label><input type="date" id="editContactDate" class="w-full border-2 border-blue-200 rounded-lg p-2 text-sm bg-blue-50/50"></div>
                <div><label class="block text-xs font-bold text-slate-400 mb-1">관리자 비고</label><textarea id="editRemarks" rows="3" class="w-full border rounded-lg p-2 text-sm"></textarea></div>
                <div class="pt-4 flex justify-end gap-2"><button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-slate-100 rounded-lg text-sm">취소</button><button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">저장하기</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://kukeoddycuqtxmoctnoe.supabase.co';
        const supabaseKey = 'sb_publishable_WibJHvbs96cfkVVnrFGicQ_xK3ZiMqJ'; // 실제 본인 키 확인
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let investorData = []; let currentEditId = null;

        async function checkSession() { const { data: { session } } = await supabaseClient.auth.getSession(); if (session) showDashboard(); else document.getElementById('login-screen').classList.remove('hidden'); }
        document.getElementById('loginForm').addEventListener('submit', async (e) => { e.preventDefault(); const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPassword').value }); if (error) alert('로그인 실패'); else showDashboard(); });
        
        function showDashboard() { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('dashboard-screen').classList.remove('hidden'); 
            document.getElementById('dashboard-screen').classList.add('flex'); 
            loadInvestors(); 
        }

        async function loadInvestors() {
            const { data, error } = await supabaseClient.from('investor_inquiries').select('*').order('created_at', { ascending: false });
            if (error) return; 
            investorData = data || [];
            populateFilterOptions(data);
            renderTable(investorData);
        }

        function renderTable(dataArray) {
            document.getElementById('total-investors').innerText = `Total: ${dataArray.length}`;
            const listElement = document.getElementById('investor-list');
            listElement.innerHTML = dataArray.map((inv, idx) => {
                const inDate = inv.created_at ? inv.created_at.split('T')[0] : '-';
                const cDate = inv.contact_date || '-';
                const cType = inv.contact_type || 'Investor';
                
                let badgeClass = 'bg-blue-100 text-blue-700';
                if(cType.includes('Gov')) badgeClass = 'bg-purple-100 text-purple-700';
                else if(cType.includes('Partner')) badgeClass = 'bg-emerald-100 text-emerald-700';

                return `
                <tr class="hover:bg-slate-50 transition border-b border-slate-50 text-xs">
                    <td class="p-4 text-center text-slate-400">${idx+1}</td>
                    <td class="p-4 font-bold"><span class="${badgeClass} px-2 py-0.5 rounded text-[10px] mr-2">${cType}</span>${inv.full_name}</td>
                    <td class="p-4">${inv.organization}</td>
                    <td class="p-4 font-semibold text-indigo-600">${inv.region || '-'}</td>
                    <td class="p-4 text-slate-500">${inv.work_email}</td>
                    <td class="p-4 text-center">${inDate}</td>
                    <td class="p-4 text-center font-bold ${!inv.contact_date ? 'text-red-400' : 'text-blue-600'}">${cDate}</td>
                    <td class="p-4 text-center"><button onclick="openEditModal('${inv.id}')" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition"><i class="fas fa-edit"></i></button></td>
                </tr>`;
            }).join('');
        }

        // ⭐ 핵심: 날짜 필터링 로직 (입력일 기간 & 접촉일 기간)
        function applyFilters() {
            const cType = document.getElementById('filterContactType').value;
            const country = document.getElementById('filterCountry').value;
            
            // 입력일 From-To
            const inStart = document.getElementById('filterInStart').value;
            const inEnd = document.getElementById('filterInEnd').value;
            
            // 접촉일 From-To
            const conStart = document.getElementById('filterContactStart').value;
            const conEnd = document.getElementById('filterContactEnd').value;
            
            let filtered = investorData;

            if (cType) filtered = filtered.filter(inv => (inv.contact_type || 'Investor') === cType);
            if (country) filtered = filtered.filter(inv => inv.region === country);

            // 입력일(created_at) 기간 필터링
            if (inStart) filtered = filtered.filter(inv => inv.created_at && inv.created_at.split('T')[0] >= inStart);
            if (inEnd) filtered = filtered.filter(inv => inv.created_at && inv.created_at.split('T')[0] <= inEnd);

            // 접촉일(contact_date) 기간 필터링
            if (conStart) filtered = filtered.filter(inv => inv.contact_date && inv.contact_date >= conStart);
            if (conEnd) filtered = filtered.filter(inv => inv.contact_date && inv.contact_date <= conEnd);

            renderTable(filtered);
        }

        function resetFilters() {
            document.querySelectorAll('input[type="date"], select').forEach(el => el.value = '');
            renderTable(investorData);
        }

        function populateFilterOptions(data) {
            const countries = [...new Set(data.map(item => item.region).filter(Boolean))].sort();
            document.getElementById('filterCountry').innerHTML = '<option value="">전체 국가</option>' + countries.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function openEditModal(id) {
            const inv = investorData.find(i => String(i.id) === String(id));
            if(!inv) return;
            currentEditId = id;
            document.getElementById('editContactType').value = inv.contact_type || 'Investor';
            document.getElementById('editName').value = inv.full_name || '';
            document.getElementById('editOrg').value = inv.organization || '';
            document.getElementById('editContactDate').value = inv.contact_date || '';
            document.getElementById('editRemarks').value = inv.remarks || '';
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        async function submitEditForm(e) {
            e.preventDefault();
            const updates = {
                contact_type: document.getElementById('editContactType').value,
                full_name: document.getElementById('editName').value,
                organization: document.getElementById('editOrg').value,
                contact_date: document.getElementById('editContactDate').value,
                remarks: document.getElementById('editRemarks').value
            };
            const { error } = await supabaseClient.from('investor_inquiries').update(updates).eq('id', currentEditId);
            if (error) alert('저장 실패'); else { closeEditModal(); loadInvestors(); }
        }

        window.onload = checkSession;
        function switchView(v) { document.getElementById('view-investor').classList.toggle('hidden', v !== 'investor'); }
    </script>
</body>
</html>
