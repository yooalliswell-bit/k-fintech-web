<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech Admin | CRM & DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .truncate-text { max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #regions_div, #piechart_div { background: #f8fafc; border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="login-screen" class="flex items-center justify-center h-screen bg-slate-900 absolute inset-0 z-50">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-white mb-6">Admin Login</h2>
            <form id="loginForm" class="space-y-4 text-left">
                <input type="email" id="adminEmail" placeholder="Email" required class="w-full bg-slate-700 border-none rounded-xl px-4 py-3 text-white">
                <input type="password" id="adminPassword" placeholder="Password" required class="w-full bg-slate-700 border-none rounded-xl px-4 py-3 text-white">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">접속하기</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-screen flex overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6 text-xl font-black border-b border-slate-800 text-blue-500">K-Fintech Admin</div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('investor')" class="w-full text-left p-3 rounded-xl bg-blue-600/20 text-blue-400 font-bold"><i class="fas fa-users mr-2"></i>투자자 CRM</button>
                <button onclick="switchView('company')" class="w-full text-left p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition"><i class="fas fa-building mr-2"></i>기업 DB 관리</button>
                <a href="index.html" target="_blank" class="block p-3 text-slate-500 text-sm hover:text-white"><i class="fas fa-external-link-alt mr-2"></i>메인사이트 가기</a>
            </nav>
            <div class="p-4 border-t border-slate-800"><button onclick="logoutAdmin()" class="text-red-400 text-sm"><i class="fas fa-sign-out-alt mr-2"></i>로그아웃</button></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div id="view-investor" class="fade-in">
                <div class="flex justify-between items-end mb-8">
                    <div><h1 class="text-3xl font-black text-slate-900">글로벌 투자자 CRM</h1><p class="text-slate-500 text-sm mt-1">실시간 유입 및 컨택 관리 대시보드</p></div>
                    <div id="total-investors" class="bg-white px-4 py-2 rounded-2xl shadow-sm border font-bold text-blue-600">Total: 0</div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="lg:col-span-2 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-4"><span class="font-bold text-slate-700">국가별 유입 지도</span>
                        <select id="mapRegion" onchange="loadInvestors()" class="text-xs border rounded-lg p-1 outline-none"><option value="world">World</option><option value="142">Asia</option><option value="150">Europe</option><option value="019">Americas</option></select></div>
                        <div id="regions_div" class="w-full h-[300px]"></div>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                        <span class="font-bold text-slate-700 block mb-4">투자자 구성비</span>
                        <div id="piechart_div" class="w-full h-[300px]"></div>
                    </div>
                </div>

                <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 mb-6">
                    <div class="flex flex-wrap items-end gap-4 text-xs font-bold text-slate-500">
                        <div class="flex-1 min-w-[120px]">구분<select id="filterContactType" class="w-full mt-1 border rounded-lg p-2 bg-slate-50"><option value="">전체</option><option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option></select></div>
                        <div class="flex-1 min-w-[120px]">국가<select id="filterCountry" class="w-full mt-1 border rounded-lg p-2 bg-slate-50"><option value="">전체</option></select></div>
                        <div class="flex-[2] min-w-[200px]">데이터 입력일 (From~To)<div class="flex items-center gap-1 mt-1"><input type="date" id="filterInStart" class="w-full border rounded-lg p-1.5"><input type="date" id="filterInEnd" class="w-full border rounded-lg p-1.5"></div></div>
                        <div class="flex-[2] min-w-[200px] text-blue-600">최근 접촉일 (From~To)<div class="flex items-center gap-1 mt-1"><input type="date" id="filterContactStart" class="w-full border border-blue-200 bg-blue-50 rounded-lg p-1.5"><input type="date" id="filterContactEnd" class="w-full border border-blue-200 bg-blue-50 rounded-lg p-1.5"></div></div>
                        <button onclick="applyFilters()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl hover:bg-slate-800 transition">조회</button>
                        <button onclick="resetFilters()" class="bg-slate-100 text-slate-400 px-4 py-2.5 rounded-xl hover:bg-slate-200"><i class="fas fa-sync-alt"></i></button>
                    </div>
                </section>

                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 font-bold border-b text-[11px] uppercase tracking-wider">
                                <th class="p-4 w-10 text-center">No</th>
                                <th class="p-4">성함 (구분)</th>
                                <th class="p-4">소속기관</th>
                                <th class="p-4">국가</th>
                                <th class="p-4">이메일</th>
                                <th class="p-4 text-center">입력일</th>
                                <th class="p-4 text-center text-blue-600">접촉일</th>
                                <th class="p-4 text-center">Edit</th>
                            </tr>
                        </thead>
                        <tbody id="investor-list" class="divide-y divide-slate-50 text-slate-700"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="view-company" class="hidden fade-in text-center py-20 text-slate-400 font-bold text-xl italic">기업 DB 관리 화면 (준비중)</div>
        </main>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-bold">Contact 상세 수정</h3><button onclick="closeEditModal()"><i class="fas fa-times"></i></button></div>
            <form id="editForm" class="p-6 space-y-4" onsubmit="submitEditForm(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">구분</label><select id="editContactType" class="w-full border rounded-xl p-2.5 text-sm bg-blue-50 border-blue-100"><option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">성함</label><input type="text" id="editName" class="w-full border rounded-xl p-2.5 text-sm"></div>
                </div>
                <div><label class="block text-[10px] font-bold text-slate-400 mb-1">소속 기관</label><input type="text" id="editOrg" class="w-full border rounded-xl p-2.5 text-sm"></div>
                <div><label class="block text-[10px] font-bold text-blue-600 mb-1">최근 접촉일 (Contact Date)</label><input type="date" id="editContactDate" class="w-full border-2 border-blue-200 rounded-xl p-2.5 text-sm bg-blue-50/50"></div>
                <div><label class="block text-[10px] font-bold text-slate-400 mb-1">비고 (Remarks)</label><textarea id="editRemarks" rows="3" class="w-full border rounded-xl p-2.5 text-sm"></textarea></div>
                <div class="pt-4 flex justify-end gap-2"><button type="button" onclick="closeEditModal()" class="px-5 py-2 rounded-xl bg-slate-100 text-sm font-bold">취소</button><button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-200">변경사항 저장</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://kukeoddycuqtxmoctnoe.supabase.co';
        const supabaseKey = 'sb_publishable_WibJHvbs96cfkVVnrFGicQ_xK3ZiMqJ';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let investorData = []; let currentEditId = null;

        google.charts.load('current', { 'packages': ['geochart', 'corechart'] });

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showDashboard(); else document.getElementById('login-screen').classList.remove('hidden');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPassword').value });
            if (error) alert('로그인 실패'); else showDashboard();
        });

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            loadInvestors();
        }

        async function loadInvestors() {
            const { data, error } = await supabaseClient.from('investor_inquiries').select('*').order('created_at', { ascending: false });
            if (error) return;
            investorData = data || [];
            populateFilterOptions(investorData);
            renderTable(investorData);
            
            // 🗺️ 지도 및 파이차트 그리기 (복구)
            google.charts.setOnLoadCallback(() => drawCharts(investorData));
        }

        function renderTable(dataArray) {
            document.getElementById('total-investors').innerText = `Total: ${dataArray.length}`;
            const listElement = document.getElementById('investor-list');
            listElement.innerHTML = dataArray.map((inv, idx) => {
                const inDate = inv.created_at ? inv.created_at.split('T')[0] : '-'; // 입력일 연동
                const cDate = inv.contact_date || '-';
                const cType = inv.contact_type || 'Investor';
                let badge = cType === 'Government' ? 'bg-purple-100 text-purple-600' : (cType === 'Partner' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600');
                
                return `<tr class="hover:bg-slate-50 transition text-xs">
                    <td class="p-4 text-center text-slate-300 font-mono">${idx+1}</td>
                    <td class="p-4 font-bold"><span class="${badge} text-[9px] px-1.5 py-0.5 rounded mr-2 uppercase tracking-tighter">${cType}</span>${inv.full_name}</td>
                    <td class="p-4 font-medium">${inv.organization}</td>
                    <td class="p-4 font-bold text-indigo-500">${inv.region || '-'}</td>
                    <td class="p-4 text-slate-400 text-[10px]">${inv.work_email}</td>
                    <td class="p-4 text-center text-slate-400">${inDate}</td>
                    <td class="p-4 text-center font-bold ${!inv.contact_date ? 'text-red-400' : 'text-blue-600'}">${cDate}</td>
                    <td class="p-4 text-center"><button onclick="openEditModal('${inv.id}')" class="text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button></td>
                </tr>`;
            }).join('');
        }

        function drawCharts(data) {
            const counts = {}; data.forEach(inv => { if (inv.region) counts[inv.region] = (counts[inv.region] || 0) + 1; });
            const chartData = [['Country', 'Count'], ...Object.entries(counts)];
            
            // 지도
            const map = new google.visualization.GeoChart(document.getElementById('regions_div'));
            map.draw(google.visualization.arrayToDataTable(chartData), { 
                region: document.getElementById('mapRegion').value, 
                colorAxis: {colors: ['#e2e8f0', '#3b82f6']}, 
                backgroundColor: 'transparent', datalessRegionColor: '#f1f5f9' 
            });

            // 파이차트
            const pie = new google.visualization.PieChart(document.getElementById('piechart_div'));
            pie.draw(google.visualization.arrayToDataTable(chartData), { 
                pieHole: 0.5, chartArea: {width:'90%',height:'90%'}, 
                colors: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'], 
                legend: {position: 'bottom', textStyle: {fontSize: 10}} 
            });
        }

        function applyFilters() {
            const cType = document.getElementById('filterContactType').value;
            const country = document.getElementById('filterCountry').value;
            const inS = document.getElementById('filterInStart').value;
            const inE = document.getElementById('filterInEnd').value;
            const coS = document.getElementById('filterContactStart').value;
            const coE = document.getElementById('filterContactEnd').value;
            
            let filtered = investorData.filter(inv => {
                const dIn = inv.created_at ? inv.created_at.split('T')[0] : '';
                const dCo = inv.contact_date || '';
                return (!cType || (inv.contact_type || 'Investor') === cType) &&
                       (!country || inv.region === country) &&
                       (!inS || dIn >= inS) && (!inE || dIn <= inE) &&
                       (!coS || dCo >= coS) && (!coE || dCo <= coE);
            });
            renderTable(filtered);
            drawCharts(filtered);
        }

        function populateFilterOptions(data) {
            const countries = [...new Set(data.map(i => i.region).filter(Boolean))].sort();
            document.getElementById('filterCountry').innerHTML = '<option value="">전체</option>' + countries.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function resetFilters() {
            document.querySelectorAll('input[type="date"], select').forEach(el => el.value = '');
            renderTable(investorData); drawCharts(investorData);
        }

        function openEditModal(id) {
            const inv = investorData.find(i => String(i.id) === String(id));
            if(!inv) return;
            currentEditId = id;
            document.getElementById('editContactType').value = inv.contact_type || 'Investor';
            document.getElementById('editName').value = inv.full_name || '';
            document.getElementById('editOrg').value = inv.organization || '';
            document.getElementById('editContactDate').value = inv.contact_date || '';
            document.getElementById('editRemarks').value = inv.remarks || '';
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        async function submitEditForm(e) {
            e.preventDefault();
            const updates = {
                contact_type: document.getElementById('editContactType').value,
                full_name: document.getElementById('editName').value,
                organization: document.getElementById('editOrg').value,
                contact_date: document.getElementById('editContactDate').value,
                remarks: document.getElementById('editRemarks').value
            };
            const { error } = await supabaseClient.from('investor_inquiries').update(updates).eq('id', currentEditId);
            if (error) alert('저장 실패'); else { closeEditModal(); loadInvestors(); }
        }

        function switchView(v) {
            document.getElementById('view-investor').classList.toggle('hidden', v !== 'investor');
            document.getElementById('view-company').classList.toggle('hidden', v !== 'company');
        }

        function logoutAdmin() { supabaseClient.auth.signOut(); window.location.reload(); }
        window.onload = checkSession;
    </script>
</body>
</html>
