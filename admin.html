<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">K-Fintech Admin</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="block p-3 rounded transition text-blue-400 hover:bg-slate-800"><- 메인 홈페이지로</a>
            <a href="#" class="block p-3 rounded transition bg-blue-600 mt-4">👥 투자자 CRM & 뉴스레터</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">투자자 CRM 관리</h1>
        </header>

        <section class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold"><i class="fas fa-users mr-2 text-green-500"></i> 홈페이지에서 유입된 투자자 리스트</h2>
                <button onclick="sendNewsletter()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">
                    선택 인원 뉴스레터 발송
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-3 border-b"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                            <th class="p-3 border-b">이름</th>
                            <th class="p-3 border-b">소속 기관</th>
                            <th class="p-3 border-b">이메일</th>
                            <th class="p-3 border-b">관심 분야</th>
                            <th class="p-3 border-b">등록일</th>
                        </tr>
                    </thead>
                    <tbody id="investor-list">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // 1. 홈페이지에서 저장한 데이터 불러오기
        function loadInvestors() {
            const listElement = document.getElementById('investor-list');
            const investors = JSON.parse(localStorage.getItem('investorDB')) || [];
            
            if(investors.length === 0) {
                listElement.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-gray-500">아직 등록된 투자자가 없습니다. 메인 페이지에서 테스트해보세요.</td></tr>`;
                return;
            }

            // 데이터를 테이블 행(tr)으로 변환
            listElement.innerHTML = investors.map((inv, index) => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 border-b"><input type="checkbox" class="investor-checkbox" value="${inv.email}"></td>
                    <td class="p-3 border-b font-medium">${inv.name}</td>
                    <td class="p-3 border-b">${inv.org}</td>
                    <td class="p-3 border-b text-blue-500">${inv.email}</td>
                    <td class="p-3 border-b"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${inv.interest}</span></td>
                    <td class="p-3 border-b text-gray-600">${inv.date}</td>
                </tr>
            `).join('');
        }

        // 2. 전체 선택 기능
        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.investor-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }

        // 3. 뉴스레터 발송 시뮬레이션
        function sendNewsletter() {
            const selected = document.querySelectorAll('.investor-checkbox:checked');
            if (selected.length === 0) {
                alert('뉴스레터를 보낼 대상을 체크박스로 선택해주세요.');
                return;
            }
            alert(`${selected.length}명의 투자자에게 영문 리포트가 성공적으로 발송되었습니다! (시뮬레이션)`);
        }

        // 페이지 로드 시 데이터 불러오기 실행
        window.onload = loadInvestors;
    </script>
</body>
</html>
