<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech Admin Dashboard (Updated CRM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        .nowrap { white-space: nowrap; } 
        .company-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; background-color: #f8fafc; border: 1px solid #e2e8f0; }
        .truncate-text { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: help; }
        .fade-in-section { animation: fadeIn 0.4s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 font-sans relative">

    <div id="login-screen" class="flex items-center justify-center h-screen bg-slate-900 absolute inset-0 z-50">
        <div class="bg-slate-800 p-10 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md text-white text-center">

            <h2 class="text-3xl font-extrabold mb-2">Admin Login</h2>

            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-screen overflow-hidden flex-row">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col border-r border-slate-800">
            <div class="p-6 text-2xl font-black border-b border-slate-800"><span class="text-blue-500 mr-1.5">K</span> Admin</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="block p-3.5 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white"><i class="fas fa-home mr-2.5"></i>웹사이트 가기</a>
                <div class="border-t border-slate-800 my-4"></div>
                <button id="nav-investor" onclick="switchView('investor')" class="w-full text-left block p-3.5 rounded-xl bg-blue-600/10 text-blue-400 font-semibold"><i class="fas fa-users-cog mr-2.5"></i>투자자 CRM</button>
                <button id="nav-company" onclick="switchView('company')" class="w-full text-left block p-3.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white"><i class="fas fa-building mr-2.5"></i>기업 DB 관리</button>
            </nav>
            <div class="p-4 border-t border-slate-800"><button onclick="logoutAdmin()" class="w-full flex items-center justify-center p-3 rounded-xl text-red-400 hover:bg-red-950/30"><i class="fas fa-sign-out-alt mr-2.5"></i>로그아웃</button></div>
        </aside>
        
        <main class="flex-1 overflow-y-auto p-8 bg-slate-50 relative">
            <header class="flex justify-between items-center mb-8 pb-6 border-b border-gray-200">
                <h1 id="page-title" class="text-4xl font-extrabold text-slate-950">투자자 CRM 관리</h1>
                <div class="text-sm font-medium text-slate-500 bg-white px-4 py-2 rounded-full border border-gray-100">최고 관리자 <i class="fas fa-check-circle text-green-500 ml-1"></i></div>
            </header>

            <div id="view-investor" class="fade-in-section">
                <section class="bg-white rounded-3xl shadow-xl p-8 mb-10 border border-gray-100">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-slate-900 flex items-center"><i class="fas fa-globe-americas mr-3 text-blue-500"></i> 글로벌 투자자 트래픽</h2>
                        <select id="mapRegion" onchange="applyFilters()" class="bg-white border-2 border-slate-300 rounded-xl px-4 py-2 text-sm font-bold cursor-pointer">
                            <option value="world">🗺️ 세계 지도</option><option value="142">🌏 아시아</option><option value="150">🌍 유럽</option><option value="019">🌎 아메리카</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-slate-50 rounded-2xl p-3"><div id="regions_div" class="w-full h-[380px]"></div></div>
                        <div class="bg-slate-50 rounded-2xl p-6"><div id="piechart_div" class="w-full h-[320px]"></div></div>
                    </div>
                </section>

                <section class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
                    <div class="flex justify-between items-center mb-6 pb-6 border-b border-gray-100">
                        <h2 class="text-2xl font-bold text-slate-900 flex items-center"><i class="fas fa-users mr-3 text-blue-500"></i>투자자 DB 리스트<span id="total-investors" class="ml-3 text-lg font-extrabold text-blue-600 bg-blue-50 px-3 py-1 rounded-full"></span></h2>
                        <div class="flex space-x-3 items-center">
                            <input type="file" id="excelFileInput" class="hidden" onchange="handleExcelUpload(event)">
                            <button onclick="downloadCrmTemplate()" class="bg-white border px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50"><i class="fas fa-file-alt mr-1.5"></i>예제 양식</button>
                            <button onclick="downloadExcel()" class="bg-white border-2 border-blue-600 text-blue-600 px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-blue-50"><i class="fas fa-file-download mr-1.5"></i>다운로드</button>
                            <button onclick="document.getElementById('excelFileInput').click()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-blue-700"><i class="fas fa-file-upload mr-1.5"></i>업로드</button>
                            <button onclick="openEmailModal()" class="bg-rose-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-rose-700 transition"><i class="fas fa-envelope mr-1.5"></i>메일 발송</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-5 rounded-2xl mb-6 border border-slate-200 flex flex-wrap gap-4 items-end shadow-sm">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">구분 (Type)</label>
                            <select id="filterContactType" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm w-32">
                                <option value="">전체</option><option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option><option value="Media">Media</option><option value="Others">Others</option>
                            </select>
                        </div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">국가</label><select id="filterCountry" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm w-32"><option value="">전체 국가</option></select></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">문의 유형</label><select id="filterType" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm w-32"><option value="">전체 유형</option></select></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">입력일(시작)</label><input type="date" id="filterStartDate" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm"></div>
                        <div class="flex space-x-2 ml-auto"><button onclick="applyFilters()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">조회</button><button onclick="resetFilters()" class="bg-white border border-slate-300 text-slate-600 px-5 py-2 rounded-lg text-sm font-bold">초기화</button></div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead><tr class="bg-gray-100 text-slate-600 font-semibold border-y border-slate-200"><th class="p-4 w-10"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th><th class="p-4 nowrap">이름 (구분)</th><th class="p-4 nowrap">소속 기관</th><th class="p-4 nowrap">국가</th><th class="p-4 nowrap">이메일/전화</th><th class="p-4 nowrap">문의유형</th><th class="p-4 nowrap text-blue-600">메시지</th><th class="p-4 nowrap">비고</th><th class="p-4 nowrap">접촉일</th><th class="p-4 text-center">관리</th></tr></thead>
                            <tbody id="investor-list" class="divide-y divide-gray-100 text-slate-700"><tr><td colspan="10" class="p-10 text-center text-slate-400">데이터를 불러오는 중입니다...</td></tr></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div id="view-company" class="hidden fade-in-section">
                <section class="bg-gradient-to-r from-slate-900 to-slate-800 rounded-2xl p-6 mb-8 text-white flex justify-between items-center border border-slate-700">
                    <div><h2 class="text-xl font-bold flex items-center mb-1"><i class="fas fa-tv text-indigo-400 mr-2"></i> 프론트엔드 자동 롤링 설정</h2><p class="text-sm text-slate-400">웹사이트에 노출할 정렬 기준을 선택하세요.</p></div>
                    <div class="flex items-center gap-3">
                        <select id="frontendSortSelect" class="bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2.5 text-sm font-bold focus:outline-none cursor-pointer">
                            <option value="created_at">⏰ 입력일순 (최신순)</option><option value="revenue">💰 매출액 높은순</option><option value="funding">📈 누적투자액 높은순</option>
                        </select>
                        <button onclick="saveDisplaySetting()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg">적용하기</button>
                    </div>
                </section>
                <section class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
                    <div class="flex justify-between items-center mb-6 pb-6 border-b border-gray-100">
                        <h2 class="text-2xl font-bold text-slate-900 flex items-center"><i class="fas fa-building mr-3 text-indigo-500"></i> 기업 DB 관리<span id="total-companies" class="ml-3 text-lg font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full"></span></h2>
                        <div class="flex space-x-3 items-center">
                             <button onclick="openCompanyModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold"><i class="fas fa-plus mr-1.5"></i>신규등록</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-left text-sm border-collapse"><thead><tr class="bg-gray-100 text-slate-600 font-semibold border-y border-slate-200"><th class="p-4">Company</th><th class="p-4">CEO</th><th class="p-4">Category</th><th class="p-4">Stage</th><th class="p-4 text-emerald-600">Revenue</th><th class="p-4 text-center">관리</th></tr></thead><tbody id="company-list" class="divide-y divide-gray-100 text-slate-700"></tbody></table></div>
                </section>
            </div>
        </main>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200">
            <div class="bg-slate-50 px-6 py-4 border-b flex justify-between items-center"><h3 class="text-xl font-bold">투자자 상세 수정</h3><button onclick="closeEditModal()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button></div>
            <form id="editForm" class="p-6 space-y-4" onsubmit="submitEditForm(event)">
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="block text-sm font-bold text-indigo-600 mb-1">구분(Type)</label>
                        <select id="editContactType" class="w-full border border-indigo-200 bg-indigo-50/30 rounded-lg px-3 py-2">
                            <option value="Investor">Investor</option><option value="Government">Government</option><option value="Partner">Partner</option><option value="Media">Media</option><option value="Others">Others</option>
                        </select>
                    </div>
                    <div><label class="block text-sm font-semibold mb-1">이름</label><input type="text" id="editName" class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-semibold mb-1">소속 기관</label><input type="text" id="editOrg" class="w-full border rounded-lg px-3 py-2"></div>
                </div>
                <div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-semibold mb-1">국가</label><select id="editRegion" class="w-full border rounded-lg px-3 py-2 bg-white"></select></div><div><label class="block text-sm font-semibold mb-1">이메일</label><input type="email" id="editEmail" class="w-full border rounded-lg px-3 py-2"></div></div>
                <div><label class="block text-sm font-semibold mb-1 text-blue-600">최근 접촉일자</label><input type="date" id="editContactDate" class="w-full border border-blue-300 bg-blue-50/30 rounded-lg px-3 py-2"></div>
                <div><label class="block text-sm font-semibold mb-1 text-blue-700">투자자 접수 메시지 (원문)</label><textarea id="editMessage" rows="2" class="w-full border rounded-lg px-3 py-2 bg-slate-50"></textarea></div>
                <div><label class="block text-sm font-semibold mb-1">관리자 비고</label><textarea id="editRemarks" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea></div>
                <div class="flex justify-end space-x-3 pt-4 border-t"><button type="button" onclick="closeEditModal()" class="px-5 py-2.5 rounded-lg bg-slate-100 font-semibold">취소</button><button type="submit" id="saveEditBtn" class="px-5 py-2.5 rounded-lg text-white bg-blue-600 font-bold">저장하기</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://kukeoddycuqtxmoctnoe.supabase.co';
        const supabaseKey = 'sb_publishable_WibJHvbs96cfkVVnrFGicQ_xK3ZiMqJ';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyicf9-dvToViOZjsenQd37H9gJdcdxOxJ5Vh07oj-esSzkZtfNSG90foBFUxT8YzMr/exec';

        let investorData = []; let currentFilteredData = []; let companyData = []; let currentEditId = null;
        const globalCountries = ["Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Argentina", "Australia", "Austria", "Belgium", "Brazil", "Canada", "Chile", "China", "Colombia", "Denmark", "Egypt", "Finland", "France", "Germany", "Greece", "Hong Kong", "India", "Indonesia", "Iran", "Ireland", "Israel", "Italy", "Japan", "Kazakhstan", "Kenya", "Luxembourg", "Malaysia", "Mexico", "Netherlands", "New Zealand", "Norway", "Pakistan", "Philippines", "Poland", "Portugal", "Qatar", "Russia", "Saudi Arabia", "Singapore", "South Africa", "South Korea", "Spain", "Sweden", "Switzerland", "Taiwan", "Thailand", "Turkey", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Vietnam"];
        const colorPalette = ['#FF6F61', '#6B5B95', '#88B04B', '#92A8D1', '#FFB74D', '#009688', '#3B82F6', '#10B981', '#F59E0B', '#F43F5E'];

        google.charts.load('current', { 'packages': ['geochart', 'corechart'] });

        async function checkSession() { const { data: { session } } = await supabaseClient.auth.getSession(); if (session) { showDashboard(); } else { document.getElementById('login-screen').classList.remove('hidden'); } }
        document.getElementById('loginForm').addEventListener('submit', async function(e) { e.preventDefault(); const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPassword').value }); if (error) alert('로그인 실패'); else showDashboard(); });
        async function logoutAdmin() { await supabaseClient.auth.signOut(); window.location.reload(); }
        function showDashboard() { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('dashboard-screen').classList.remove('hidden'); 
            document.getElementById('dashboard-screen').classList.add('flex'); 
            document.getElementById('editRegion').innerHTML = globalCountries.map(c => `<option value="${c}">${c}</option>`).join('');
            loadInvestors(); loadCompanies(); 
        }
        function switchView(v) { document.getElementById('view-investor').classList.toggle('hidden', v !== 'investor'); document.getElementById('view-company').classList.toggle('hidden', v !== 'company'); }

        // 투자자 로드 및 렌더링
        async function loadInvestors() {
            const { data, error } = await supabaseClient.from('investor_inquiries').select('*').order('created_at', { ascending: false });
            if (error) return; 
            investorData = data || [];
            currentFilteredData = data || [];
            populateFilterOptions(data);
            updateViewWithData(data);
        }

        function updateViewWithData(dataArray) {
            document.getElementById('total-investors').innerText = `총 ${dataArray.length}명`;
            renderTable(dataArray);
            const countryCounts = {}; dataArray.forEach(inv => { if (inv.region) countryCounts[inv.region] = (countryCounts[inv.region] || 0) + 1; });
            if(Object.keys(countryCounts).length > 0) drawDashboard(countryCounts);
        }

        function renderTable(dataArray) {
            const listElement = document.getElementById('investor-list');
            const today = new Date();
            listElement.innerHTML = dataArray.map((inv) => {
                const formattedDate = inv.created_at ? inv.created_at.split('T')[0] : '-';
                // 구분 배지 로직 추가
                const cType = inv.contact_type || 'Investor';
                let cTypeClass = 'bg-blue-100 text-blue-700 border-blue-200';
                if(cType.includes('Gov')) cTypeClass = 'bg-purple-100 text-purple-700 border-purple-200';
                else if(cType.includes('Partner')) cTypeClass = 'bg-emerald-100 text-emerald-700 border-emerald-200';
                else if(cType.includes('Media')) cTypeClass = 'bg-orange-100 text-orange-700 border-orange-200';
                
                const typeBadge = `<span class="text-[10px] font-extrabold px-1.5 py-0.5 rounded border ${cTypeClass} mr-2 shadow-sm">${cType}</span>`;
                const isNew = (new Date() - new Date(inv.created_at)) / (1000 * 60 * 60 * 24) <= 3 && (!inv.contact_date);
                const newBadge = isNew ? `<span class="bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded ml-1 animate-pulse">NEW</span>` : '';

                return `
                <tr class="hover:bg-blue-50/50 bg-white border-b transition text-xs">
                    <td class="p-4"><input type="checkbox" class="investor-checkbox" value="${inv.work_email}"></td>
                    <td class="p-4 font-bold flex items-center">${typeBadge}${inv.full_name}${newBadge}</td>
                    <td class="p-4">${inv.organization}</td>
                    <td class="p-4 font-bold text-blue-600">${inv.region || '-'}</td>
                    <td class="p-4">${inv.work_email}<br><span class="text-slate-400">${inv.phone || ''}</span></td>
                    <td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded-full">${inv.interest_area}</span></td>
                    <td class="p-4 truncate-text" title="${inv.message}">${inv.message || '-'}</td>
                    <td class="p-4 truncate-text">${inv.remarks || '-'}</td>
                    <td class="p-4 font-bold ${!inv.contact_date ? 'text-red-500':'text-blue-600'}">${inv.contact_date || '미접촉'}</td>
                    <td class="p-4 text-center"><button onclick="openEditModal('${inv.id}')" class="text-blue-500 bg-blue-50 p-2 rounded"><i class="fas fa-edit"></i></button></td>
                </tr>`;
            }).join('');
        }

        // 필터링 기능 (구분 추가)
        function applyFilters() {
            const country = document.getElementById('filterCountry').value;
            const type = document.getElementById('filterType').value;
            const contactType = document.getElementById('filterContactType').value;
            const startDate = document.getElementById('filterStartDate').value;
            
            let filtered = investorData;
            if (country) filtered = filtered.filter(inv => inv.region === country);
            if (type) filtered = filtered.filter(inv => inv.interest_area === type);
            if (contactType) filtered = filtered.filter(inv => (inv.contact_type || 'Investor') === contactType);
            if (startDate) filtered = filtered.filter(inv => inv.created_at && inv.created_at.split('T')[0] >= startDate);
            
            currentFilteredData = filtered;
            updateViewWithData(filtered);
        }

        function populateFilterOptions(data) {
            const countries = [...new Set(data.map(item => item.region).filter(Boolean))].sort();
            const types = [...new Set(data.map(item => item.interest_area).filter(Boolean))].sort();
            document.getElementById('filterCountry').innerHTML = '<option value="">전체 국가</option>' + countries.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('filterType').innerHTML = '<option value="">전체 유형</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function resetFilters() { document.querySelectorAll('select').forEach(s => s.selectedIndex = 0); document.getElementById('filterStartDate').value = ''; applyFilters(); }

        // 수정 모달
        function openEditModal(id) {
            const inv = investorData.find(item => String(item.id) === String(id));
            if(!inv) return;
            currentEditId = id;
            document.getElementById('editContactType').value = inv.contact_type || 'Investor';
            document.getElementById('editName').value = inv.full_name || '';
            document.getElementById('editOrg').value = inv.organization || '';
            document.getElementById('editRegion').value = inv.region || 'South Korea';
            document.getElementById('editEmail').value = inv.work_email || '';
            document.getElementById('editContactDate').value = inv.contact_date || '';
            document.getElementById('editMessage').value = inv.message || '';
            document.getElementById('editRemarks').value = inv.remarks || '';
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }
        async function submitEditForm(e) {
            e.preventDefault();
            const updates = {
                contact_type: document.getElementById('editContactType').value,
                full_name: document.getElementById('editName').value,
                organization: document.getElementById('editOrg').value,
                region: document.getElementById('editRegion').value,
                work_email: document.getElementById('editEmail').value,
                contact_date: document.getElementById('editContactDate').value,
                message: document.getElementById('editMessage').value,
                remarks: document.getElementById('editRemarks').value
            };
            const { error } = await supabaseClient.from('investor_inquiries').update(updates).eq('id', currentEditId);
            if (error) alert('수정 오류'); else { closeEditModal(); loadInvestors(); }
        }

        // 엑셀 다운로드 (양식 수정됨)
        async function downloadCrmTemplate() {
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('투자자_업로드양식');
            const refSheet = workbook.addWorksheet('ReferenceData'); refSheet.state = 'hidden';
            globalCountries.forEach((c, i) => refSheet.getCell(`A${i+1}`).value = c);
            ["Investor", "Government", "Partner", "Media", "Others"].forEach((t, i) => refSheet.getCell(`B${i+1}`).value = t);
            
            worksheet.columns = [
                { header: '구분(Type)', key: 'type', width: 15 },
                { header: '이름', key: 'name', width: 15 },
                { header: '소속기관', key: 'org', width: 25 },
                { header: '국가', key: 'country', width: 20 },
                { header: '이메일', key: 'email', width: 30 },
                { header: '문의유형', key: 'interest', width: 20 },
                { header: '메시지', key: 'msg', width: 40 }
            ];
            // 드롭다운 설정
            for (let i = 2; i <= 100; i++) {
                worksheet.getCell(`A${i}`).dataValidation = { type: 'list', formulae: ['ReferenceData!$B$1:$B$5'] };
                worksheet.getCell(`D${i}`).dataValidation = { type: 'list', formulae: ['ReferenceData!$A$1:$A$195'] };
            }
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), '투자자_CRM_업로드양식.xlsx');
        }

        // 공통 함수
        function toggleAll(source) { document.querySelectorAll('.investor-checkbox').forEach(cb => cb.checked = source.checked); }
        function drawDashboard(counts) { 
            var pieData = google.visualization.arrayToDataTable([['Country', 'Count'], ...Object.entries(counts)]);
            var pie = new google.visualization.PieChart(document.getElementById('piechart_div'));
            pie.draw(pieData, { pieHole: 0.4, chartArea: {width:'100%',height:'80%'}, colors: colorPalette });
            var mapData = google.visualization.arrayToDataTable([['Country', 'Count'], ...Object.entries(counts)]);
            var map = new google.visualization.GeoChart(document.getElementById('regions_div'));
            map.draw(mapData, { colorAxis: {colors: ['#e2e8f0', '#3b82f6']} });
        }

        // 기업 관련 함수 (기존 코드 유지)
        async function loadCompanies() {
            const { data } = await supabaseClient.from('kfintech_directory').select('*').order('created_at', { ascending: false });
            companyData = data || [];
            document.getElementById('total-companies').innerText = `총 ${companyData.length}개`;
            renderCompanyTable(companyData);
        }
        function renderCompanyTable(arr) {
            document.getElementById('company-list').innerHTML = arr.map(c => `
                <tr class="bg-white border-b text-xs">
                    <td class="p-4 font-bold">${c.company_name}</td>
                    <td class="p-4">${c.ceo_name || '-'}</td>
                    <td class="p-4"><span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded">${c.category}</span></td>
                    <td class="p-4">${c.funding_stage || '-'}</td>
                    <td class="p-4 font-bold text-emerald-600">${c.revenue || '-'}</td>
                    <td class="p-4 text-center"><button class="text-slate-400 hover:text-indigo-600 mx-1"><i class="fas fa-edit"></i></button></td>
                </tr>`).join('');
        }

        window.onload = checkSession;
    </script>
</body>
</html>
