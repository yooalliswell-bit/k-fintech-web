<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        .nowrap { white-space: nowrap; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-screen" class="flex items-center justify-center h-screen bg-slate-900">
        <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-white text-center">
            <i class="fas fa-lock text-5xl text-blue-500 mb-6"></i>
            <h2 class="text-3xl font-bold mb-2">Admin Login</h2>
            <p class="text-slate-400 mb-8">K-Fintech 통합 관리자 시스템</p>
            
            <form id="loginForm" class="space-y-4 text-left">
                <div>
                    <label for="adminEmail" class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <input type="email" id="adminEmail" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label for="adminPassword" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input type="password" id="adminPassword" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition mt-6">
                    로그인
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-screen overflow-hidden flex-row">
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-slate-700">K-Fintech Admin</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="index.html" class="block p-3 rounded transition text-blue-400 hover:bg-slate-800"><i class="fas fa-home mr-2"></i>홈페이지로 돌아가기</a>
                <div class="border-t border-slate-700 my-4"></div>
                <a href="#" class="block p-3 rounded transition bg-blue-600 font-semibold"><i class="fas fa-database mr-2"></i>통합 대시보드</a>
            </nav>
            <div class="p-4 border-t border-slate-700">
                <button onclick="logoutAdmin()" class="w-full flex items-center justify-center p-2 rounded text-red-400 hover:bg-slate-800 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>로그아웃
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-gray-100">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">통합 시스템 관리</h1>
            </header>

            <section class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <i class="fas fa-globe-americas mr-2 text-blue-500"></i> 글로벌 투자자 분포 (Global CRM)
                </h2>
                <div id="regions_div" class="w-full h-[400px] border border-gray-200 rounded-lg flex items-center justify-center bg-slate-50">
                    <span class="text-gray-400 font-medium">데이터를 분석하여 지도를 그리는 중입니다...</span>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <i class="fas fa-upload mr-2 text-blue-500"></i> K-Fintech 기업 DB 관리
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="p-4 border rounded-lg hover:border-blue-400 cursor-pointer text-center bg-gray-50">
                        <span class="block font-bold text-lg">핀테크 서비스</span>
                    </div>
                    <div class="p-4 border rounded-lg hover:border-green-400 cursor-pointer text-center bg-gray-50">
                        <span class="block font-bold text-lg">보안/인증</span>
                    </div>
                    <div class="p-4 border rounded-lg hover:border-yellow-400 cursor-pointer text-center bg-gray-50">
                        <span class="block font-bold text-lg">인프라/솔루션</span>
                    </div>
                    <div class="p-4 border rounded-lg hover:border-purple-400 cursor-pointer text-center bg-gray-50">
                        <span class="block font-bold text-lg">블록체인/Web3</span>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold"><i class="fas fa-users mr-2 text-green-500"></i> 투자자 CRM (실시간 DB 연동)</h2>
                    <button onclick="sendNewsletter()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 font-semibold shadow">
                        <i class="fas fa-paper-plane mr-1"></i> 선택 인원 뉴스레터 발송
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="p-3 border-b w-10"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                                <th class="p-3 border-b nowrap">이름</th>
                                <th class="p-3 border-b nowrap">소속 기관</th>
                                <th class="p-3 border-b nowrap text-blue-600">지역</th>
                                <th class="p-3 border-b nowrap">이메일</th>
                                <th class="p-3 border-b nowrap">문의 유형</th>
                                <th class="p-3 border-b nowrap">가입일</th>
                            </tr>
                        </thead>
                        <tbody id="investor-list">
                            <tr><td colspan="7" class="p-8 text-center text-gray-500">데이터를 불러오는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ⚠️ 본인의 프로젝트 URL과 KEY로 변경하세요!
        const supabaseUrl = 'https://kukeoddycuqtxmoctnoe.supabase.co';
        const supabaseKey = 'sb_publishable_WibJHvbs96cfkVVnrFGicQ_xK3ZiMqJ';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  
        // 구글 지도 차트 준비
        google.charts.load('current', { 'packages': ['geochart'] });

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showDashboard();
            else document.getElementById('login-screen').classList.remove('hidden');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert('로그인 실패: 아이디나 비밀번호를 확인해주세요.');
            else showDashboard();
        });

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            const dashboard = document.getElementById('dashboard-screen');
            dashboard.classList.remove('hidden');
            dashboard.classList.add('flex');
            loadInvestors(); 
        }

        // (admin.html 스크립트 내부)
        async function loadInvestors() {
            const listElement = document.getElementById('investor-list');
            const { data, error } = await supabaseClient.from('investor_inquiries').select('*').order('created_at', { ascending: false });

            if (error) { /* 에러 처리 생략 (기존 동일) */ return; }
            if(data.length === 0) { /* 데이터 없음 처리 생략 (기존 동일) */ return; }

            // 1️⃣ 구글 지도를 위한 국가별 카운트 자동화! (맵핑 코드 싹 지움)
            const countryCounts = {};
            data.forEach(inv => {
                const c = inv.region; // DB에서 가져온 국가명 (예: United States)
                if (c && c !== 'Others') {
                    countryCounts[c] = (countryCounts[c] || 0) + 1;
                }
            });

            google.charts.setOnLoadCallback(() => drawRegionsMap(countryCounts));

            // 표 그리기 로직 (기존과 동일)
            listElement.innerHTML = data.map((inv) => {
                const formattedDate = inv.created_at ? inv.created_at.split('T')[0] : '-';
                return `
                <tr class="hover:bg-blue-50 transition border-b border-gray-100">
                    <td class="p-3"><input type="checkbox" class="investor-checkbox" value="${inv.work_email}"></td>
                    <td class="p-3 font-medium text-gray-800">${inv.full_name}</td>
                    <td class="p-3 text-gray-600">${inv.organization}</td>
                    <td class="p-3 text-blue-700 font-bold bg-blue-50 rounded">${inv.region || '미지정'}</td> <td class="p-3 text-gray-600">${inv.work_email}</td>
                    <td class="p-3"><span class="bg-slate-200 text-slate-800 text-xs font-bold px-2 py-1 rounded">${inv.interest_area}</span></td>
                    <td class="p-3 text-gray-500 text-sm">${formattedDate}</td>
                </tr>
                `;
            }).join('');
        }

        // 🗺️ 지도 그리기 함수 (훨씬 짧고 똑똑해졌습니다)
        function drawRegionsMap(counts) {
            // 구글 차트가 이해할 수 있는 배열 형태로 변환 ['Country', 'Count']
            var dataTable = [['Country', 'Investors Count']];
            for (const [country, count] of Object.entries(counts)) {
                dataTable.push([country, count]);
            }
            
            var data = google.visualization.arrayToDataTable(dataTable);

            var options = {
                colorAxis: {colors: ['#e2e8f0', '#3b82f6', '#1e3a8a']},
                backgroundColor: '#f8fafc',
                datalessRegionColor: '#f1f5f9',
                defaultColor: '#f1f5f9',
            };

            var chart = new google.visualization.GeoChart(document.getElementById('regions_div'));
            chart.draw(data, options);
        }

        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.investor-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }

        window.onload = checkSession;
    </script>
</body>
</html>
