<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Fintech | Invest in the Future of Korean Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .bg-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased">

    <nav class="fixed w-full z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tighter">K-<span class="text-blue-500">Fintech</span></div>
            <div class="hidden md:flex space-x-8 text-sm font-medium text-slate-300">
                <a href="#market" class="hover:text-white transition">Market Insights</a>
                <a href="#kfintech" class="hover:text-white transition">Featured K-Fintechs</a>
                <a href="admin.html" class="text-blue-400 hover:text-blue-300 transition">Go to Admin -></a>
            </div>
            <a href="#contact" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-semibold transition">Get 2026 Report</a>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Accelerating the <span class="gradient-text">Future of Finance</span></h1>
        <p class="text-xl text-slate-400 mb-10 max-w-3xl mx-auto">Connect with top-tier K-Fintech companies backed by data-driven 2026 market projections.</p>
        <a href="#kfintech" class="bg-white text-slate-900 px-8 py-3 rounded-full font-bold hover:bg-slate-200 transition">Explore K-Fintechs</a>
    </section>

    <section id="contact" class="py-24 bg-gradient-to-b from-slate-900 to-black px-6">
        <div class="max-w-4xl mx-auto bg-slate-800/80 p-10 rounded-3xl border border-slate-700 shadow-2xl">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold mb-4">Unlock the 2026 K-Fintech Report</h2>
                <p class="text-slate-400">Join our exclusive investor network.</p>
            </div>
            
            <form id="investorForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Full Name</label>
                        <input type="text" id="fullName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Organization</label>
                        <input type="text" id="orgName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Work Email</label>
                    <input type="email" id="email" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Areas of Interest</label>
                    <select id="interest" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white">
                        <option value="Payment">Payment & Remittance</option>
                        <option value="Blockchain">Blockchain & Web3</option>
                        <option value="Security">Security & KYC</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg text-lg mt-4">
                    Request Report & Join Network
                </button>
            </form>
        </div>
    </section>

    <script>
        // 폼 제출 시 데이터를 임시 저장소에 저장하는 로직
        document.getElementById('investorForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 페이지 새로고침 방지
            
            const newInvestor = {
                name: document.getElementById('fullName').value,
                org: document.getElementById('orgName').value,
                email: document.getElementById('email').value,
                interest: document.getElementById('interest').value,
                date: new Date().toISOString().split('T')[0] // 오늘 날짜
            };

            // 기존 데이터 불러오기 (없으면 빈 배열)
            let investors = JSON.parse(localStorage.getItem('investorDB')) || [];
            investors.push(newInvestor); // 새 데이터 추가
            
            // 다시 저장하기
            localStorage.setItem('investorDB', JSON.stringify(investors));
            
            alert('Thank you! 성공적으로 접수되었습니다. 관리자 페이지에서 확인해보세요!');
            this.reset(); // 폼 초기화
        });
    </script>
</body>
</html>
